<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" width="860" height="240" font-family="'Arial Black','Arial',sans-serif">
  <!-- Emblem -->
  <g transform="translate(120 120)">
    <!-- rough brush rings -->
    <circle cx="0" cy="0" r="92" fill="none" stroke="#ffffff" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="320 24 96 18 64 22" transform="rotate(-25)"/>
    <circle cx="0" cy="0" r="101" fill="none" stroke="#ffffff" stroke-width="3"
            stroke-linecap="round" stroke-dasharray="44 32 130 64 86 44" opacity="0.7" transform="rotate(60)"/>
    <!-- inner dark disc -->
    <circle cx="0" cy="0" r="72" fill="#171717"/>
    <!-- R letter -->
    <text x="2" y="48" text-anchor="middle" font-size="148" font-weight="900" fill="#f2f2f2">R</text>
  </g>

  <!-- Wordmark -->
  <text x="248" y="58" font-size="27" font-weight="700" letter-spacing="8" fill="#ffffff">WELCOME TO</text>

  <text x="248" y="148" font-size="84" font-weight="900" letter-spacing="1">
    <tspan fill="#e10600">EVOL</tspan><tspan fill="#ffffff">UTION</tspan>
  </text>

  <text x="252" y="196" font-size="36" font-weight="700" font-style="italic" letter-spacing="4" fill="#d6d6d6">BENZ-ACTION</text>
</svg>
